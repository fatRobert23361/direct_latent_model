project: coconut-translator
save_path: ./models/prosqa-coconut-hybrid_v7
name: prosqa-coconut-hybrid-v7-resume

# 训练阶段控制
epochs_per_stage: 5
max_latent_stage: 6
c_thought: 2
pad_latent_to_max: True
uniform_prob: 0.1  # 10% 概率随机采样低 stage，增加训练多样性缓解过拟合
no_cot: False

# 翻译器相关 (混合 Loss 参数)
lambda_translator: 0.5    # 翻译器 Loss 的最大权重（实际值 = 0.5 * stage/max_stage，动态递增）
translator_lr: !!float "5e-4"  # translator 独立 lr，建议为主模型 lr 的 3-5 倍
warmup_steps_per_stage: 100  # 每个 stage 开始时的 LR warmup 步数

# 基础训练参数
model_id: openai-community/gpt2
train_path: data/prosqa_train.json
val_path: data/prosqa_valid.json
batch_size_training: 8   
gradient_accumulation_steps: 4
lr: !!float "1e-4"
weight_decay: 0.01
num_eval_samples: 300       

# 预训练权重路径
# 1. 纯 Coconut 思考模型的权重
load_model_path: /home/haoyang/haoyang/coconut/models/nihaoyang2002-kth-royal-institute-of-technology/checkpoint_5
# 2. 带有 Cross-Attention 的纯翻译器权重 (如果有的话就填，没有就填 null)
load_translator_path: null

# 恢复训练相关参数
resume_from_checkpoint: null
resume_stage: 1
resume_epoch: 0

# 如果你只想单独给最后一个 stage 加训，覆盖默认的 epochs_per_stage：
# (如果不需要覆盖，可以不填或填与 epochs_per_stage 相同的值)
epochs_for_final_stage: 20