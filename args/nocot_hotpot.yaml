# GPT-2 No-COT baseline on HotpotQA (direct Q->A, no reasoning steps)

project:   coconut-hotpot
name:      nocot

model_id:  openai-community/gpt2

train_path: data/hotpot_cot_train.json
val_path:   data/hotpot_cot_valid.json
test_path:  data/hotpot_cot_test.json

# Training
num_epochs:                  25
batch_size_training:         8
batch_size_eval:             8
gradient_accumulation_steps: 4
lr:                          !!float 2e-5
weight_decay:                0.01
warmup_steps:                100

# Evaluation
max_new_tokens_eval: 50
n_samples_upload:    50

# Checkpoint
save_path: models/nocot_hotpot

seed:  42
debug: false
resume_from_checkpoint: ~
