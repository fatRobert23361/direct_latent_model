project: coconut-direct-latent
save_path: ./models/direct_latent_no_trans_prosqa
name: direct_latent_no_trans_prosqa

# 模型参数
model_id: openai-community/gpt2
n_latent: 6
use_translator: false        # baseline：无 translator，纯 coconut latent 训练

# 数据路径
train_path: data/prosqa_train.json
val_path:   data/prosqa_valid.json
test_path:  data/prosqa_test.json

# 训练超参（与 direct_latent.yaml 保持一致）
lr: !!float "1e-4"
weight_decay: 0.01
batch_size_training: 16
gradient_accumulation_steps: 2
num_epochs: 60
warmup_steps: 100

# COT 遮蔽调度（与 direct_latent.yaml 保持一致）
p_mask_start:          0.0
p_mask_end:            1.0
p_mask_warmup_epochs:  5
p_mask_ramp_end_epoch: 49

# 评估
num_eval_samples: 300
max_new_tokens_eval: 150
n_translations_upload: 0     # 无 translator，不上传翻译

# 权重加载 / 断点续训
resume_from_checkpoint: null

# 随机种子
seed: 42

# 调试
debug: false
